name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pytest pytest-asyncio pytest-cov
          if [ -f services/auth-service/requirements.txt ]; then pip install -r services/auth-service/requirements.txt; fi
          if [ -f services/model-service/requirements.txt ]; then pip install -r services/model-service/requirements.txt; fi
          if [ -f services/inference-service/requirements.txt ]; then pip install -r services/inference-service/requirements.txt; fi
          if [ -f services/worker-service/requirements.txt ]; then pip install -r services/worker-service/requirements.txt; fi

      - name: Lint with Ruff
        run: ruff check services/

      - name: Security scan (Bandit)
        run: bandit -r services/ -lll -ii

      - name: Run unit tests
        run: pytest services/ --cov=services -v || true
