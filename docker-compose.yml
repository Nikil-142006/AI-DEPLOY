version: "3.9"

networks:
  ai-deploy-net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  model_storage:  # Shared volume: model-service writes, inference-service reads

services:
  # ─────────────── Infrastructure ───────────────
  # mongodb:
  #   image: mongo:6.0
  #   container_name: ai-deploy-mongodb
  #   restart: unless-stopped
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aideploy}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongodb_secret}
  #     MONGO_INITDB_DATABASE: ${MONGO_DB:-aideploy}
  #   volumes:
  #     - mongodb_data:/data/db
  #     - ./scripts/init_db.js:/docker-entrypoint-initdb.d/init_db.js:ro
  #   ports:
  #     - "27017:27017"
  #   networks:
  #     - ai-deploy-net
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5


  redis:
    image: redis:7-alpine
    container_name: ai-deploy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ai-deploy-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ai-deploy-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-aideploy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ai-deploy-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────── Microservices ───────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: ai-deploy-auth
    restart: unless-stopped
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super_secret_jwt_key_change_in_prod}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - SERVICE_NAME=auth-service
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-deploy-net

  model-service:
    build:
      context: ./services/model-service
      dockerfile: Dockerfile
    container_name: ai-deploy-model
    restart: unless-stopped
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-aideploy}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-ai-deploy-models-dev}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super_secret_jwt_key_change_in_prod}
      - SERVICE_NAME=model-service
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_MODEL_STORAGE_PATH=/app/model-storage
    volumes:
      - model_storage:/app/model-storage
    ports:
      - "8002:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-deploy-net

  worker-service:
    build:
      context: ./services/worker-service
      dockerfile: Dockerfile
    container_name: ai-deploy-worker
    restart: unless-stopped
    environment:
      - MONGO_URI=${MONGO_URI}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-aideploy}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-ai-deploy-models-dev}
      - ECR_REGISTRY=${ECR_REGISTRY:-}
      - KUBECONFIG=/app/kubeconfig
      - SERVICE_NAME=worker-service
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-deploy-net

  inference-service:
    build:
      context: ./services/inference-service
      dockerfile: Dockerfile
    container_name: ai-deploy-inference
    restart: unless-stopped
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super_secret_jwt_key_change_in_prod}
      - SERVICE_NAME=inference-service
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_MODEL_STORAGE_PATH=/app/model-storage
    volumes:
      - model_storage:/app/model-storage
    ports:
      - "8003:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-deploy-net

  # ─────────────── Monitoring ───────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ai-deploy-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - ai-deploy-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ai-deploy-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - ai-deploy-net
