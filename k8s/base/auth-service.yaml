apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ai-deploy
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rolling_update:
      max_surge: 1
      max_unavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 138114712066.dkr.ecr.us-east-1.amazonaws.com/ai-deploy/auth-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: ai-deploy-secrets
                  key: mongo-uri
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-deploy-secrets
                  key: redis-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-deploy-secrets
                  key: jwt-secret-key
            - name: SERVICE_NAME
              value: "auth-service"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ai-deploy
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
