apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-deploy-ingress
  namespace: ai-deploy
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /models(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: model-service
                port:
                  number: 80
          - path: /inference(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: inference-service
                port:
                  number: 80
