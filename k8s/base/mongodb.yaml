apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: ai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "aideploy"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "change_me_in_prod"
            - name: MONGO_INITDB_DATABASE
              value: "aideploy"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: ai-deploy
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
