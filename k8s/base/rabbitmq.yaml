apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: ai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "aideploy"
            - name: RABBITMQ_DEFAULT_PASS
              value: "change_me_in_prod"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ai-deploy
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  type: ClusterIP
