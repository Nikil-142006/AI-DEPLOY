apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "change_me_in_prod"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ai-deploy
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
