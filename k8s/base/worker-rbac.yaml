apiVersion: v1
kind: ServiceAccount
metadata:
  name: aideploy-worker-sa
  namespace: model-serving
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aideploy-model-deployer
  namespace: model-serving
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aideploy-model-deployer-binding
  namespace: model-serving
subjects:
  - kind: ServiceAccount
    name: aideploy-worker-sa
    namespace: model-serving
roleRef:
  kind: Role
  name: aideploy-model-deployer
  apiGroup: rbac.authorization.k8s.io
